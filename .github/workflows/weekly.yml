---
name: Weekly Tests
on:
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  tests:
    name: Weekly Tests
    uses: ./.github/workflows/tests.yml
    with:
      os: '["ubuntu-latest", "macos-latest", "windows-latest"]'
      python-version: '["3.14"]'
